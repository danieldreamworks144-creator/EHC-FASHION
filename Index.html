<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EHR FASHION — Shop on WhatsApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: white;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h1, h2, h3, .font-serif {
      font-family: 'Playfair Display', serif;
    }

    /* Phone frame */
    .phone-frame {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: black;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    /* Top bar (always visible) */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 20px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .top-bar h1 {
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    /* Scroll container */
    .scroll-container {
      height: 100%;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }
    .scroll-container {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Each slide */
    .slide {
      width: 100%;
      height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
      background: #171717;
    }

    .slide img.bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Overlay gradients */
    .slide .overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    /* Intro slide */
    .intro-slide .overlay {
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 40%, rgba(0,0,0,0.8) 100%);
    }

    .intro-content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .intro-content .subhead {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .intro-content h2 {
      font-size: 3rem;
      line-height: 1.2;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s forwards;
    }

    .intro-content p {
      font-size: 0.85rem;
      opacity: 0.7;
      max-width: 220px;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s forwards;
    }

    .swipe-indicator {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 20;
    }

    .swipe-indicator svg {
      width: 28px;
      height: 28px;
      color: rgba(255,255,255,0.8);
      animation: bounceUp 1.5s infinite ease-in-out;
    }

    /* Product slide */
    .product-slide .overlay {
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 40%, transparent 100%);
    }

    .product-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 20px;
      padding-bottom: 30px;
      gap: 16px;
    }

    .product-text {
      flex: 1;
    }

    .product-text .category-tag {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .product-text h3 {
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .product-text .price {
      font-size: 1.3rem;
      font-weight: 500;
      opacity: 0.9;
    }

    .product-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding-bottom: 6px;
    }

    .action-btn {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      border: none;
      outline: none;
    }

    .action-btn:hover, .action-btn:active {
      background: rgba(255,255,255,0.3);
      transform: scale(1.1);
    }

    .action-btn svg {
      width: 22px;
      height: 22px;
    }

    .order-btn {
      background: #16a34a;
      border-radius: 50%;
    }

    .order-btn:hover, .order-btn:active {
      background: #15803d;
    }

    /* Closing slide */
    .closing-slide {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      text-align: center;
      padding: 20px;
    }

    .closing-slide h2 {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .closing-slide p {
      opacity: 0.7;
      margin-bottom: 32px;
    }

    .social-row {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .social-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s;
    }

    .social-circle svg {
      width: 24px;
      height: 24px;
    }
    .social-circle.wa svg { fill: #25D366; }
    .social-circle.tg svg { fill: #0088cc; }
    .social-circle.tk svg { fill: #ffffff; }
    .social-circle.em svg { fill: #ea4335; }

    /* Floating social bar (right side, always visible) */
    .floating-social {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    .float-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s;
    }

    .float-btn svg {
      width: 20px;
      height: 20px;
    }
    .float-btn.wa svg { fill: #25D366; }
    .float-btn.tg svg { fill: #0088cc; }
    .float-btn.tk svg { fill: #ffffff; }
    .float-btn.em svg { fill: #ea4335; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounceUp {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (min-width: 481px) {
      .phone-frame {
        border-radius: 30px;
        height: 90vh;
        margin: 5vh 0;
      }
    }
  </style>
</head>
